name: Release Charts

on:
  push:
    branches: [main]
    paths:
      - "charts/randoli-agent/**"
  workflow_dispatch:

permissions:
  contents: write   # GitHub Releases + gh-pages push
  packages: write   # GHCR push

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      # charts/**/charts/*.tgz is gitignored, so the wrapper tarballs that
      # randoli-agent depends on are not in the checkout. Rebuild them
      # before packaging the umbrella chart.
      - name: Build subchart dependencies
        run: ./scripts/build-subcharts.sh

      # Package only randoli-agent — chart-releaser-action would otherwise
      # scan charts/* and release every wrapper chart too.
      - name: Package randoli-agent
        run: |
          mkdir -p .cr-release-packages
          helm package charts/randoli-agent --destination .cr-release-packages

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          skip_packaging: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_SKIP_EXISTING: true

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GHCR
        run: |
          shopt -s nullglob
          for pkg in .cr-release-packages/*.tgz; do
            helm push "$pkg" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/helm-charts"
          done
