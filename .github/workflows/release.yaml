name: Release Charts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # GitHub Releases + gh-pages push
  packages: write   # GHCR push

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate chart version, branch, and git tag
        id: validate
        run: ./scripts/validate-release.sh

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      # Package all sub sharts
      - name: Build subchart dependencies
        run: ./scripts/build-subcharts.sh

      # Package randoli-agent
      - name: Package randoli-agent
        run: |
          mkdir -p .cr-release-packages
          helm package charts/randoli-agent --destination .cr-release-packages

      - name: Run chart-releaser
        # One commit past v1.7.0, pending a v1.7.1 tag. Contains the fix for
        # https://github.com/helm/chart-releaser-action/issues/171
        uses: helm/chart-releaser-action@3e001cb8c68933439c7e721650f20a07a1a5c61e # v1.7.0+1
        with:
          skip_packaging: true
          # Only stable versions become "Latest" — pre-releases keep the badge off
          # even when cut from main.
          mark_as_latest: ${{ steps.validate.outputs.is_stable }}
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_SKIP_EXISTING: true

      - name: Mark GitHub Release as pre-release
        if: steps.validate.outputs.is_stable == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="randoli-agent-${{ steps.validate.outputs.version }}"
          gh release edit "$tag" --prerelease

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push charts to GHCR
        run: |
          shopt -s nullglob
          for pkg in .cr-release-packages/*.tgz; do
            helm push "$pkg" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/helm-charts"
          done
