# Values passed through to the upstream opentelemetry-operator chart.
# Full upstream value reference:
# https://github.com/open-telemetry/opentelemetry-helm-charts/blob/main/charts/opentelemetry-operator/values.yaml
opentelemetry-operator:
  fullnameOverride: "randoli-rok-otel"

  # CRDs are installed via the crds/ directory (Helm pre-install), so the upstream
  # chart must not render them again as tracked templates.
  crds:
    create: false

  manager:
    collectorImage:
      repository: "otel/opentelemetry-collector-k8s"
    # Go instrumentation — replaced --enable-go-instrumentation=true feature gate (removed in 0.111.0)
    autoInstrumentation:
      go:
        enabled: true

  admissionWebhooks:
    # failurePolicy: Ignore means the API server accepts CRs even when the operator
    # webhook is unreachable (e.g. during initial install before the pod is Ready).
    # The operator fully validates all CRs once it is running.
    # This removes the need for a post-install Job to wait for operator readiness.
    failurePolicy: Ignore
    certManager:
      enabled: false
    autoGenerateCert:
      enabled: true
      recreate: true
