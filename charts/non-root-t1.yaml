# Source: randoli-agent/charts/prometheus/charts/alertmanager/templates/randoli/apply-config-map-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: apply-randoli-alerts-cm
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 3 
  template:
    spec:
      serviceAccountName: randoli-alerts-cm-applier
      containers:
      - name: apply-cm
        image: docker.io/bitnamilegacy/kubectl:1.33.1
        command:
        - /bin/bash
        - -c
        - |
          echo "⏳ Applying randoli alerts Config Map..."
          kubectl apply -f /cms/configmap.yaml
          echo "✅ Randoli alerts Config Map Applied"
        volumeMounts:
        - name: cms
          mountPath: /cms
      restartPolicy: Never
      volumes:
      - name: cms
        configMap:
          name: randoli-alerts-cms
---
# Source: randoli-agent/charts/prometheus/charts/alertmanager/templates/randoli/delete-config-map-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: delete-randoli-alerts-cm
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: randoli-alerts-cm-applier
      containers:
      - name: delete-cms
        image: docker.io/bitnamilegacy/kubectl:1.33.1
        command:
        - /bin/bash
        - -c
        - |
          echo "⏳ Deleting Randoli Alerts CMs..."
          set -e

          NAMESPACE="randoli-agents"
          CONFIGMAP_NAME="randoli-alerts"

          # Check and delete ConfigMap if it exists
          if kubectl get configmap "$CONFIGMAP_NAME" -n "$NAMESPACE" > /dev/null 2>&1; then
            echo "Deleting ConfigMap $CONFIGMAP_NAME..."
            kubectl delete configmap "$CONFIGMAP_NAME" -n "$NAMESPACE" --wait=true
          else
            echo "ConfigMap $CONFIGMAP_NAME not found, skipping."
          fi
      restartPolicy: Never
---
# Source: randoli-agent/templates/randoli-db/delete-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: delete-agent-manifests
  annotations:
    helm.sh/hook: post-delete
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: agent-manifests-applier
      containers:
      - name: delete-agent-manifests
        image: docker.io/bitnamilegacy/kubectl:1.33.1
        command:
        - /bin/bash
        - -c
        - |
          echo "⏳ Deleting Randoli Manifests..."
          set -e

          NAMESPACE="randoli-agents"
          SECRET_NAME="randoli-agent-db"

          # Check and delete secret if it exists
          if kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" > /dev/null 2>&1; then
            echo "Deleting Secret $SECRET_NAME..."
            kubectl delete secret "$SECRET_NAME" -n "$NAMESPACE"
          else
            echo "Secret $SECRET_NAME not found, skipping."
          fi
      restartPolicy: Never
---
# Source: randoli-agent/templates/randoli-db/job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: apply-agent-manifests
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 3 
  template:
    spec:
      serviceAccountName: agent-manifests-applier
      containers:
      - name: apply-manifests
        image: docker.io/bitnamilegacy/kubectl:1.33.1
        command:
        - /bin/bash
        - -c
        - |
          echo "⏳ Applying Agent Mafinests..."
          set -e

          NAMESPACE="randoli-agents"
          SECRET_NAME="randoli-agent-db"

          # Create Secret only if it doesn't exists
          if kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" > /dev/null 2>&1; then
            echo "Secret $SECRET_NAME already exists, skipping"
          else
            echo "Creating secret $SECRET_NAME..."
            kubectl create secret generic $SECRET_NAME -n "$NAMESPACE" --from-literal=username=admin --from-literal=password=$(openssl rand -base64 16)
          fi
      restartPolicy: Never
