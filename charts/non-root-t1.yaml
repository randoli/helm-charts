apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: randoli-agent
  namespace: randoli-agents
  labels:
    app.kubernetes.io/name: randoli-agent
    app.kubernetes.io/instance: randoli-non-root
    app.kubernetes.io/component: randoli-agent
    app.kubernetes.io/version: "1.18"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: randoli-agent-1.18.2
  annotations:
    resource.opentelemetry.io/service.name: randoli-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: randoli-agent
      app.kubernetes.io/instance: randoli-non-root
      app.kubernetes.io/component: randoli-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: randoli-agent
        app.kubernetes.io/instance: randoli-non-root
        app.kubernetes.io/component: randoli-agent
    spec:
      volumes:
        - name: agent-pv
          persistentVolumeClaim:
            claimName: randoli-agent
        - name: tls-certs
          secret:
            secretName: randoli-agent-cert
            items:
              - key: client-cert.pem
                path: client-cert.pem
              - key: client-key.pem
                path: client-key.pem
            defaultMode: 420
        - name: shared-migrations
          emptyDir: {}
        - name: gizmosql-tmp
          emptyDir: {}
      
      initContainers:
        - name: init
          image: "docker.io/randoli/insights-agent:1.18"
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "copying migrations..."
              cp -r /migration-scripts/* /migrations/
              cp -r /migrate /migrations/migrate
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          resources:
            requests:
              cpu: 50m
              memory: 128Mi    
          volumeMounts:
            - name: shared-migrations
              mountPath: /migrations
            - name: agent-pv
              mountPath: /persistence
        - name: migrate-db
          image: datacatering/duckdb:v1.4.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "waiting for migration scripts..." &&
              while [ ! -f /migrations/migrate ]; do sleep 1; done
              chmod +x /migrations/migrate
              ln -s /duckdb /bin/duckdb

              # remove .wal file
              rm -rf /persistence/agent.db.wal

              echo "running migrations..."
              /migrations/migrate /persistence/agent.db

              echo "setting up permissions..."
              chown :1001 /persistence/agent.db
              chmod 660 /persistence/agent.db
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          resources:
            requests:
              cpu: 50m
              memory: 128Mi       
          volumeMounts:
            - name: shared-migrations
              mountPath: /migrations
            - name: agent-pv
              mountPath: /persistence
      containers:
        - name: randoli-agent
          image: "docker.io/randoli/insights-agent:1.18"
          imagePullPolicy: Always
          args:
            - |
              echo "Waiting for the FlightSQL server to be ready..."
              while ! nc -z localhost 31337; do
                sleep 1
              done
              echo "Starting agent..."
              exec /tmp/guvnor
          command:
            - /bin/sh
            - -c
          envFrom:
            - secretRef:
                name: randoli-agent-secret
            - configMapRef:
                name: randoli-agent-config
          resources:
            limits:
              cpu: 1
              memory: 1.5Gi
            requests:
              cpu: 150m
              memory: 1.5Gi
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          volumeMounts:
            - name: agent-pv
              mountPath: /persistence
            - name: tls-certs
              mountPath: /app/certs
          env:
            - name: FLIGHT_SQL_USER
              valueFrom:
                secretKeyRef:
                  name: randoli-agent-db
                  key: username
            - name: FLIGHT_SQL_PASS
              valueFrom:
                secretKeyRef:
                  name: randoli-agent-db
                  key: password
        - name: gizmosql
          image: docker.io/gizmodata/gizmosql:v1.12.5
          livenessProbe:
            exec:
              command:
              - sh
              - -c
              - gizmosql_client --command Execute --host localhost --port 31337 --username
                "$GIZMOSQL_USERNAME" --password "$GIZMOSQL_PASSWORD" --query "SELECT 1503+1503"
                | grep -q 3006 || exit 1
            failureThreshold: 2
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 2
          ports:
          - containerPort: 31337
          volumeMounts:
          - name: agent-pv
            mountPath: /persistence
          - name: gizmosql-tmp
            mountPath: /var/gizmosql-tmp    
          env:
          - name: GIZMOSQL_PATH
            value: /persistence/agent.db
          - name: GIZMOSQL_USERNAME
            valueFrom:
              secretKeyRef:
                name: randoli-agent-db
                key: username
          - name: GIZMOSQL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: randoli-agent-db
                key: password
          - name: DATABASE_BACKEND
            value: duckdb
          - name: DATABASE_FILENAME
            value: /persistence/agent.db
          - name: TLS_ENABLED
            value: "0"
          - name: PRINT_QUERIES
            value: "0"
          - name: SECRET_KEY
            value: "randoli_db_test"
          - name: INIT_SQL_COMMANDS
            value: |
              PRAGMA memory_limit='1GB';
              PRAGMA threads=2;
              PRAGMA max_temp_directory_size='5GB';
              PRAGMA preserve_insertion_order=false;
              CREATE SCHEMA IF NOT EXISTS insights_agent;
              PRAGMA schema='insights_agent';
              PRAGMA search_path='insights_agent';
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
          resources:
            limits:
              cpu: 1
              memory: 3Gi
            requests:
              cpu: 150m
              memory: 2Gi
      serviceAccountName: randoli-agent
      serviceAccount: randoli-agent
      securityContext:
        fsGroup: 1001
