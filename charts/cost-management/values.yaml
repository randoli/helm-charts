# Values passed through to the upstream opencost chart.
# Full upstream value reference:
# https://github.com/opencost/opencost-helm-chart/blob/main/charts/opencost/values.yaml
opencost:
  fullnameOverride: "randoli-cmk-opencost"

  imagePullSecrets: []

  opencost:
    exporter:
      image:
        registry: docker.io
        repository: randoli/opencost
        # TODO: confirm the published fork image tag for OpenCost v1.120.3 before release.
        tag: "v1.120.3-randoli.1"
        pullPolicy: IfNotPresent

      # Prometheus query/subquery resolution -> PROMETHEUS_QUERY_RESOLUTION_SECONDS.
      # Default 300s (5m) is too coarse for the sparse LLM token metric, so /llm returns empty.
      # 60s (1m) captures it; dense CPU/RAM metrics are unaffected.
      prometheusDataSource:
        queryResolutionSeconds: 60

      # CLUSTER_ID is set by the upstream chart via defaultClusterId below.
      # Override at install time: --set costManagement.opencost.opencost.exporter.defaultClusterId=<name>
      defaultClusterId: "default-cluster"

      env:
        # Downward API — used by RANDOLI_AGENT_SERVER and PROMETHEUS_URL below
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: RANDOLI_AGENT_SERVER
          value: "http://randoli-agent.$(POD_NAMESPACE).svc:8080"
        - name: RANDOLI_AGENT_RETRY_INTERVAL_IN_SECONDS
          value: '5'
        - name: INSECURE_SKIP_VERIFY
          value: "true"

      extraVolumeMounts: []

      tolerations: []
      nodeSelector: {}
      affinity: {}

    extraContainers:
      - name: network-cost-metrics
        image: "docker.io/randoli/network-cost-metrics:1.0.1"
        imagePullPolicy: Always
        ports:
          - containerPort: 8080
            name: http-metrics
        env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: METRIC_GENERATION_INTERVAL
            value: "2m"
          - name: PROMETHEUS_URL
            value: "http://randoli-obs-prometheus.$(POD_NAMESPACE).svc:80"
          - name: PROMETHEUS_TIMEOUT
            value: "30s"

    prometheus:
      internal:
        enabled: true
        # Matches fullnameOverride set in charts/prometheus/values.yaml
        serviceName: "randoli-obs-prometheus"
        namespaceName: "{{ .Release.Namespace }}"
        port: 80

    ui:
      enabled: false

    metrics:
      kubeStateMetrics:
        emitKsmV1Metrics: false
        emitKsmV1MetricsOnly: false

  service:
    extraPorts:
      - name: http-metrics
        port: 8080
        targetPort: 8080

  extraVolumes: []
