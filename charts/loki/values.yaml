# Values passed through to the upstream grafana/loki chart.
# Full upstream value reference:
# https://github.com/grafana/loki/blob/main/production/helm/loki/values.yaml
loki:
  fullnameOverride: "randoli-obs-loki"

  # SingleBinary mode: all Loki components run in a single pod.
  # Suitable for small installs without HA. Requires filesystem or S3 storage.
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

  singleBinary:
    replicas: 1
    # Preserve PVCs (and the data they hold) across StatefulSet scale-down or
    # deletion. Upstream defaults wipe them on uninstall; we want users to
    # delete the PVC manually if they no longer need the data.
    persistence:
      enableStatefulSetAutoDeletePVC: false
      whenScaled: Retain
      whenDeleted: Retain

  # Zero out SimpleScalable components — upstream defaults these to 3
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  test:
    enabled: false

  # Scheduling constraints — set to match global.* values from the umbrella chart if needed.
  # global.imagePullSecrets → loki.loki.imagePullSecrets
  # global.affinity        → loki.loki.singleBinary.affinity
  imagePullSecrets: []
