apiVersion: v2
name: network
description: >
  Randoli wrapper for netobserv-operator. Installs the NetObserv Network
  Observability operator without requiring cert-manager by managing TLS
  certificates through a pre-existing Kubernetes Secret or an optional
  self-signed certificate generation Job.
type: application
version: 1.11.3
appVersion: 1.11.3-community

keywords:
  - network observability
  - ebpf
  - netobserv
  - flow tracing
  - topology
  - network

home: https://netobserv.io/

sources:
  - https://github.com/netobserv/network-observability-operator
  - https://github.com/randoli/helm-charts

dependencies:
  - name: netobserv-operator
    version: 1.8.2
    repository: https://netobserv.io/static/helm/
