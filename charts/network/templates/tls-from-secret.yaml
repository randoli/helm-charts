{{/*
Mode A: copy TLS cert/key from a pre-existing Secret into all resources
required by the netobserv operator and its sub-components.

Resources created:
  In the release namespace:
    webhook-server-cert Secret   — operator webhook
    manager-metrics-tls Secret   — operator metrics

  In <netobservNamespace>:
    flowlogs-pipeline-cert Secret — eBPF agent → FLP traffic
    netobserv-ca ConfigMap        — CA bundle for eBPF agents

  In <netobservNamespace>-privileged:
    netobserv-ca ConfigMap        — CA bundle for eBPF agents

  Namespace resources for both netobserv namespaces are created with
  helm.sh/resource-policy: keep so they survive helm uninstall (the
  operator owns these namespaces at runtime).

The source secret must exist in the release namespace before helm install.
See README.md for the openssl commands and secret structure.
*/}}
{{- if .Values.tls.existingSecret.name }}
{{- $ns         := .Release.Namespace }}
{{- $flpNS      := .Values.netobservNamespace }}
{{- $privNS     := printf "%s-privileged" .Values.netobservNamespace }}
{{- $name       := .Values.tls.existingSecret.name }}
{{- $certKey    := .Values.tls.existingSecret.certKey }}
{{- $keyKey     := .Values.tls.existingSecret.keyKey }}
{{- $caKey      := .Values.tls.existingSecret.caKey }}
{{- $flpCertKey := .Values.tls.existingSecret.flpCertKey }}
{{- $flpKeyKey  := .Values.tls.existingSecret.flpKeyKey }}
{{- $src        := lookup "v1" "Secret" $ns $name }}
{{- $certVal    := "" }}
{{- $keyVal     := "" }}
{{- $caVal      := "" }}
{{- $flpCertVal := "" }}
{{- $flpKeyVal  := "" }}
{{- if $src }}
  {{- $data := $src.data | default dict }}
  {{- $certVal    = index $data $certKey    | default "" }}
  {{- $keyVal     = index $data $keyKey     | default "" }}
  {{- $caVal      = index $data $caKey      | default "" }}
  {{- $flpCertVal = index $data $flpCertKey | default "" }}
  {{- $flpKeyVal  = index $data $flpKeyKey  | default "" }}
  {{- if not $certVal }}
    {{- fail (printf "charts/network: key '%s' not found in Secret '%s/%s'" $certKey $ns $name) }}
  {{- end }}
  {{- if not $keyVal }}
    {{- fail (printf "charts/network: key '%s' not found in Secret '%s/%s'" $keyKey $ns $name) }}
  {{- end }}
  {{- if not $caVal }}
    {{- fail (printf "charts/network: key '%s' not found in Secret '%s/%s' (CA cert required for netobserv-ca ConfigMap)" $caKey $ns $name) }}
  {{- end }}
  {{- if not $flpCertVal }}
    {{- fail (printf "charts/network: key '%s' not found in Secret '%s/%s' (FLP cert required for flowlogs-pipeline-cert)" $flpCertKey $ns $name) }}
  {{- end }}
  {{- if not $flpKeyVal }}
    {{- fail (printf "charts/network: key '%s' not found in Secret '%s/%s'" $flpKeyKey $ns $name) }}
  {{- end }}
{{- end }}
---
# Operator webhook cert — release namespace
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: webhook-server-cert
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: netobserv
data:
  tls.crt: {{ $certVal }}
  tls.key: {{ $keyVal }}
---
# Operator metrics cert — release namespace
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: manager-metrics-tls
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: netobserv
data:
  tls.crt: {{ $certVal }}
  tls.key: {{ $keyVal }}
---
# netobserv namespace — kept on helm uninstall (operator owns it at runtime)
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $flpNS }}
  labels:
    app.kubernetes.io/part-of: netobserv
  annotations:
    "helm.sh/resource-policy": keep
---
# netobserv-privileged namespace — kept on helm uninstall
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $privNS }}
  labels:
    app.kubernetes.io/part-of: netobserv
  annotations:
    "helm.sh/resource-policy": keep
---
# FLP cert — netobserv namespace
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: flowlogs-pipeline-cert
  namespace: {{ $flpNS }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: netobserv
data:
  tls.crt: {{ $flpCertVal }}
  tls.key: {{ $flpKeyVal }}
---
# CA bundle for eBPF agents — netobserv namespace
apiVersion: v1
kind: ConfigMap
metadata:
  name: netobserv-ca
  namespace: {{ $flpNS }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: netobserv
data:
  service-ca.crt: {{ $caVal | b64dec }}
---
# CA bundle for eBPF agents — netobserv-privileged namespace
apiVersion: v1
kind: ConfigMap
metadata:
  name: netobserv-ca
  namespace: {{ $privNS }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: netobserv
data:
  service-ca.crt: {{ $caVal | b64dec }}
{{- end }}
