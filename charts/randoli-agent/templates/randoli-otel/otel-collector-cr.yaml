{{- if .Values.tags.observability -}}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: randoli-otel
  labels:
    randoli/app-type: otel-pipeline
    {{- with .Values.global.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.otelCollector.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if or .Values.global.annotations .Values.otelCollector.annotations }}
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.otelCollector.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- with coalesce .Values.otelCollector.tolerations .Values.global.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with coalesce .Values.otelCollector.nodeSelector .Values.global.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with coalesce .Values.otelCollector.affinity .Values.global.affinity }}
  affinity:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  image: docker.io/randoli/otelcol:v1.0.3
  upgradeStrategy: automatic
  mode: statefulset
  serviceAccount: randoli-otel-collector
  autoscaler:
    maxReplicas: 5
    minReplicas: 2
    targetMemoryUtilization: 85
  resources:
    requests:
      memory: "1000Mi"
    limits:
      memory: "1500Mi"
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins:
              - "*"
              allowed_headers: ["*"]
      prometheus:
        config:
          scrape_configs:
          - job_name: 'otel-collector'
            scrape_interval: 10s
            static_configs:
            - targets: [ '0.0.0.0:8888' ]
            metric_relabel_configs:
            - action: labeldrop
              regex: (id|name)
            - action: labelmap
              regex: label_(.+)
              replacement: $$1

          # Use Kubernetes service discovery to find scrape targets in Tempo distributed mode.
          {{- if eq (include "tempo.distributed.enabled" .) "true" }}
          - job_name: tempo
            scrape_interval: 30s
            kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                - {{ .Release.Namespace }}
            relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
              regex: randoli-obs-tempo-dist
              action: keep
            # Avoid non-tempo pods from being scraped
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
              regex: distributor|ingester|querier|query-frontend|compactor
              action: keep
            - source_labels: [__meta_kubernetes_pod_ip]
              target_label: __address__
              replacement: $${1}:3200
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: instance
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
              target_label: component
          {{- else }}
          # Use the Tempo service to scrape metrics in the single binary mode
          - job_name: tempo
            scrape_interval: 30s
            static_configs:
            - targets:
              - randoli-obs-tempo.{{ .Release.Namespace }}.svc:3200
          {{- end }}

          # Use Kubernetes service discovery to find scrape targets in Loki distributed mode.
          {{- if eq (include "loki.distributed.enabled" .) "true" }}
          - job_name: loki
            scrape_interval: 30s
            kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                - {{ .Release.Namespace }}
            relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
              regex: randoli-obs-loki-dist
              action: keep
            # Avoid non-loki pods from being scraped
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
              regex: distributor|ingester|querier|query-frontend|query-scheduler|compactor|index-gateway|ruler
              action: keep
            - source_labels: [__meta_kubernetes_pod_ip]
              target_label: __address__
              replacement: $${1}:3100
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: instance
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
              target_label: component
          {{- else }}
          # Loki /metrics (port 3100 on the loki Service)
          - job_name: loki
            scrape_interval: 30s
            static_configs:
            - targets:
              - randoli-obs-loki.{{ .Release.Namespace }}.svc:3100
          {{- end }}

          # Vector agent /metrics — internal_metrics source + prometheus_exporter
          # sink on port 9598 (configured in the ClusterVectorPipeline).
          # Pods are discovered by label; kaasops vector-operator labels agents
          # with app.kubernetes.io/name=vector.
          - job_name: vector
            scrape_interval: 30s
            kubernetes_sd_configs:
            - role: pod
              namespaces:
                names:
                - {{ .Release.Namespace }}
            relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
              regex: vector
              action: keep
            - source_labels: [__meta_kubernetes_pod_ip]
              target_label: __address__
              replacement: $${1}:9598
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: instance
    exporters:
      otlp/tempo:
        endpoint: '{{ include "trace-storage-url-otlp" . }}'
        tls:
          insecure: true
      otlphttp:
        endpoint: "{{ include "prometheus-server-endpoint" . }}/api/v1/otlp"
      debug:
        verbosity: basic
        sampling_initial: 5
        sampling_thereafter: 200
    processors:
      randoli_otel_enricher: {}
      memory_limiter:
        check_interval: 5s
        limit_mib: 900
        spike_limit_mib: 200
      batch:
        send_batch_size: 512
        send_batch_max_size: 1024
        timeout: 5s
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
            - container.image.name
            - container.image.tag
            - k8s.container.name
        pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.ip
          - sources:
              - from: connection
    connectors:
      spanmetrics: {}
      llmmetrics: {}
    service:
      telemetry:
        metrics:
          level: "detailed"
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: "0.0.0.0"
                    port: 8888
        resource:
          service.name: randoli-otel-collector
      pipelines:
        traces:
          receivers: [otlp]
          processors:
            - memory_limiter
            - k8sattributes
            - randoli_otel_enricher
            - batch
          exporters: [debug, spanmetrics, llmmetrics, otlp/tempo]
        metrics:
          receivers: [otlp, prometheus, spanmetrics, llmmetrics]
          processors:
            - memory_limiter
            - randoli_otel_enricher
            - batch
          exporters: [debug, otlphttp]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
  {{- if .Values.observability.otel.applyTargetAllocator }}
  targetAllocator:
    {{- with coalesce .Values.otelCollector.tolerations .Values.global.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    enabled: true
    prometheusCR:
      enabled: true
      serviceMonitorSelector:
        matchExpressions:
          - key: app
            operator: NotIn
            values:
              - "flowlogs-pipeline"
          - key: netobserv-managed
            operator: NotIn
            values:
              - "true"
          - key: app.kubernetes.io/instance
            operator: NotIn
            values:
              - 'prometheus-operator'
      podMonitorSelector: {}
    serviceAccount: opentelemetry-targetallocator
  {{- end }}
{{- end }}
