apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "randoli-agent.fullname" . }}-config
  namespace: {{ include "randoli-agent.namespace" . }}
  labels:
    {{- include "labels" . | nindent 4 }}
data:
  AGENT_CONTROLLER_DIAL_TIMEOUT: 10000ms
  APP_NAME: randoli-agent
  APP_NAMESPACE: {{ include "randoli-agent.namespace" . }}
  CONSOLE_URL: https://console.insights.randoli.io
  CLIENT_CERT_PATH: /app/certs/client-cert.pem
  CLIENT_PRIVATE_KEY_PATH: /app/certs/client-key.pem
  CONTEXT_PATH: /
  DEBUG: 'false'
  HTTP_SERVICE_PORT: '8080'
  KEYCLOAK_TIMEOUT: 1m0s
  {{- if .Values.global.opencost.url }}
  OPENCOST_BACKEND_URL: {{ .Values.global.opencost.url }}
  {{ else }}
  OPENCOST_BACKEND_URL: http://randoli-cmk-opencost.{{ .Release.Namespace }}.svc:9003
  {{ end -}}
  OPENCOST_POD_PREFIX: randoli-cmk-opencost
  PROMETHEUS_URL: {{ include "prometheus-server-endpoint" . }}
  PROMETHEUS_INSECURE_SKIP_VERIFY: {{ .Values.global.prometheus.tlsInsecureSkipVerify | quote }}
  TLS_ENABLED: 'true'
  RIGHTSIZING_RECOMMENDATIONS_ENABLED: '{{ .Values.tags.costManagement }}'
  RIGHTSIZING_INSTALL_VPA: '{{ include "enable.vpa.operator" . }}'
  RIGHTSIZING_MIN_POD_CPU_MILLICORES: '{{ .Values.vpa.recommender.minCpuMillicores }}'
  RIGHTSIZING_MIN_POD_RAM_MB: '{{ .Values.vpa.recommender.minMemoryMb }}'
  SECURITY_SCANS_MODE: '{{ include "observability.security.mode" . }}'
  SECURITY_SCANS_CRON_SPEC: '{{ .Values.observability.security.cronSpec }}'
  SECURITY_SCANS_INSTALL_KUBESCAPE: '{{ include "enable.security" . }}'
  ENABLE_DEFAULT_TIMELINE_PROMETHEUS_QUERIES: '{{ .Values.agent.anomalyDetection.defaultsQueries.enabled }}'
  PROMETHEUS_CUSTOM_QUERIES_PATH: '{{ .Values.agent.anomalyDetection.customQueries.path }}'
  OPENCOST_INSTALL: '{{ .Values.tags.costManagement }}'
  IMAGE_REGISTRY: '{{ .Values.agent.image.registry }}'
  IMAGE_REPOSITORY: '{{ .Values.agent.image.repository }}'
  IMAGE_TAG: '{{ .Values.agent.image.tag }}'
  IMAGE_DIGEST: '{{ .Values.agent.image.digest }}'
  IMAGE_PULL_POLICY: '{{ .Values.agent.image.pullPolicy }}'
  RESOURCES_LIMITS_CPU: '{{ .Values.agent.resources.limits.cpu }}'
  RESOURCES_LIMITS_MEMORY: '{{ .Values.agent.resources.limits.memory }}'
  RESOURCES_REQUESTS_CPU: '{{ .Values.agent.resources.requests.cpu }}'
  RESOURCES_REQUESTS_MEMORY: '{{ .Values.agent.resources.requests.memory }}'
  PIXIE_INSTALL: '{{ include "enable.pixie.operator" .}}'
  LOG_ANALYZERS_ENABLED: '{{ and .Values.tags.observability .Values.observability.logs.analyzers.enabled }}'
  VECTOR_INSTALL: '{{ include "enable.vector" . }}'
  VECTOR_HTTP_SINKER_URL: 'http://randoli-agent.{{ include "randoli-agent.namespace" . }}:8080/log-sink/'
  PROMETHEUS_INSTALL: '{{ .Values.global.prometheus.install }}'
  TEKTON_PIPELINE_ENABLED: '{{ .Values.agent.tektonPipeline.enabled }}'
  JAEGER_QUERY_SVC_GRPC: randoli-rok-jaeger-query.{{ .Release.Namespace }}:16685
  JAEGER_QUERY_SVC_HTTP: http://randoli-rok-jaeger-query.{{ .Release.Namespace }}:16686
  PROMETHEUS_ALERTMANAGER_URL: http://randoli-obs-alerts.{{ .Release.Namespace }}:9093
  TRACE_STORAGE_BACKEND_TYPE: '{{ .Values.observability.traceConfig.storage.type }}'
  TRACE_STORAGE_BACKEND_URL: {{ include "trace-storage-url" . }}
  SUPERVISOR_AGENT_HTTP_URL: 'http://sre-agent/chat'
  POPULATE_RES_INDEX_FROM_DB: ''
  FLIGHT_SQL_HOST: localhost:31337
  RANDOLI_AGENT_HTTP_ENDPOINT: 'http://randoli-agent.{{ include "randoli-agent.namespace" . }}:8080'
  ENABLE_SUPERVISOR_AGENT_REPORTS: '{{ .Values.observability.sreAgent.enableReports }}'

  {{- if .Values.observability.agentInstrumentation.enabled }}
  OTEL_ENABLED: 'true'
  {{- if .Values.observability.agentInstrumentation.otlpEndpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: '{{ .Values.observability.agentObservability.otlpEndpoint }}'
  {{ else }}
  OTEL_EXPORTER_OTLP_ENDPOINT: 'http://randoli-otel-collector.{{ .Release.Namespace }}.svc:4317'
  {{- end }}
  {{- end }}
