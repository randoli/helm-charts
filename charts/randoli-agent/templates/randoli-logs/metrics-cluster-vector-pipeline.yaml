{{- if eq (include "enable.vector" .) "true" -}}
# Vector internal metrics pipeline — exposes Vector's own runtime metrics
# as a Prometheus scrape endpoint on every agent pod at :9598. 
# Scraped by the OTel collector via the Target Allocator
#
apiVersion: observability.kaasops.io/v1alpha1
kind: ClusterVectorPipeline
metadata:
  name: randoli-obs-vector-metrics
spec:
  sources:
    internal_metrics_source:
      type: internal_metrics
      scrape_interval_secs: 30
  transforms:
    metric_filter:
      type: filter
      inputs:
        - internal_metrics_source
      condition: >-     
        includes([
          "buffer_discarded_events_total",
          "buffer_max_byte_size",
          "buffer_received_events_total",
          "buffer_sent_events_total",
          "buffer_size_bytes",
          "buffer_size_events",
          "build_info",
          "component_discarded_events_total",
          "component_errors_total",
          "component_latency_mean_seconds",
          "component_latency_seconds",
          "component_received_event_bytes_total",
          "component_received_events_total",
          "component_sent_event_bytes_total",
          "component_sent_events_total",
          "component_timed_out_events_total",
          "component_timed_out_requests_total",
          "config_reload_rejected",
          "events_discarded_total",
          "http_client_errors_total",
          "http_client_requests_sent_total",
          "http_client_responses_total",
          "open_files",
          "utilization",
          "source_buffer_utilization",
          "source_lag_time_seconds",
          "source_send_latency_seconds"
        ], .name)
  sinks:
    metrics_prometheus_exporter:
      type: prometheus_exporter
      inputs:
        - metric_filter
      address: 0.0.0.0:9598
{{- end }}
