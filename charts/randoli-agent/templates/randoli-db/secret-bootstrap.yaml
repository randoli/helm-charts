{{- /*
Generate the Db secret which will be used by the Flight SQL server and the Agent

The Job runs as a pre-install / pre-upgrade hook (ArgoCD translates this to
PreSync) and is idempotent: it creates the Secret only when missing.
*/ -}}
{{- $secretName := printf "%s-db" (include "randoli-agent.fullname" .) -}}
{{- $bootstrapName := printf "%s-db-bootstrap" (include "randoli-agent.fullname" .) -}}
{{- $namespace := include "randoli-agent.namespace" . -}}
{{- $hookAnnotations := dict
  "helm.sh/hook" "pre-install,pre-upgrade"
  "helm.sh/hook-delete-policy" "before-hook-creation,hook-succeeded"
-}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $bootstrapName }}
  namespace: {{ $namespace }}
  annotations:
    {{- range $k, $v := $hookAnnotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    helm.sh/hook-weight: "-5"
  labels:
    app.kubernetes.io/name: {{ include "randoli-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: db-bootstrap
    {{- include "labels" . | nindent 4 }}
{{- with .Values.global.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $bootstrapName }}
  namespace: {{ $namespace }}
  annotations:
    {{- range $k, $v := $hookAnnotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    helm.sh/hook-weight: "-4"
  labels:
    app.kubernetes.io/name: {{ include "randoli-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: db-bootstrap
    {{- include "labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $bootstrapName }}
  namespace: {{ $namespace }}
  annotations:
    {{- range $k, $v := $hookAnnotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    helm.sh/hook-weight: "-3"
  labels:
    app.kubernetes.io/name: {{ include "randoli-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: db-bootstrap
    {{- include "labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ $bootstrapName }}
    namespace: {{ $namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $bootstrapName }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $bootstrapName }}
  namespace: {{ $namespace }}
  annotations:
    {{- range $k, $v := $hookAnnotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    helm.sh/hook-weight: "-1"
  labels:
    app.kubernetes.io/name: {{ include "randoli-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: db-bootstrap
    {{- include "labels" . | nindent 4 }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "randoli-agent.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: db-bootstrap
    spec:
      serviceAccountName: {{ $bootstrapName }}
      restartPolicy: OnFailure
      {{- with coalesce .Values.agent.tolerations .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with coalesce .Values.agent.nodeSelector .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with coalesce .Values.agent.affinity .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bootstrap
          image: docker.io/alpine/k8s@sha256:7aa52956f4bfa7e95bd9a6ee59674748033e2f192df3ccf8487086b1c390974b
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -eu
              SECRET={{ $secretName | quote }}
              NS={{ $namespace | quote }}
              if kubectl get secret "$SECRET" -n "$NS" >/dev/null 2>&1; then
                echo "Secret $SECRET already exists in namespace $NS; skipping creation."
                exit 0
              fi
              PASSWORD="$(tr -dc 'A-Za-z0-9' </dev/urandom | head -c 32)"
              kubectl create secret generic "$SECRET" \
                -n "$NS" \
                --from-literal=username=fsqluser \
                --from-literal=password="$PASSWORD"
              echo "Secret $SECRET created in namespace $NS."
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
