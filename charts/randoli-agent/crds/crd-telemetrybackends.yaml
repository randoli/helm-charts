apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: telemetrybackends.telemetry.randoli.io
spec:
  group: telemetry.randoli.io
  names:
    kind: TelemetryBackend
    listKind: TelemetryBackendList
    plural: telemetrybackends
    singular: telemetrybackend
    shortNames:
      - tb
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: Backend configuration as raw JSON containing baseURL and type
            status:
              type: object
              properties:
                ready:
                  type: boolean
                  description: Indicates whether the proxy route is registered
                message:
                  type: string
                  description: Human-readable status message
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Message
          type: string
          jsonPath: .status.message
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
