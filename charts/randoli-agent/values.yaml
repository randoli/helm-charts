# ============================================================================
# Umbrella-shared config — read by helpers and propagated to subcharts
# ============================================================================
global:
  imagePullSecrets: []
  networkCostMetrics:
    image:
      registry: docker.io
      repository: randoli/network-cost-metrics
      tag: "1.0.1"
      pullPolicy: Always
    metricGenerationInterval: 2m
    prometheusTimeout: 30s
    url:
  opencost:
    url:
  openshift:
    enabled: false

  # global Prometheus config
  prometheus:
    # Prometheus will not be automatically installed when this flag is false.
    install: true

    # Configure a custom/managed Prometheus instance
    url: ""
    secretName: ""
    usernameKey: ""
    passwordKey: ""
    bearerTokenKey: token
    tlsInsecureSkipVerify: true
    tlsCertConfigmapName: ""
    tlsCertConfigmapKey: ""

  # Alert manager config
  alerts:
    slack:
      channel:
      api_url:

  # Agent secrets. These can be downloaded from the Randoli App Insights platform
  secrets:
    cert: randoli-agent-cert
    config: randoli-agent-secret
  nodeSelector: {}
  affinity: {}
  tolerations: []
  daemonsets:
    nodeSelector: {}
    affinity: {}
    tolerations: []

# ============================================================================
# Feature-set toggles. Enable a tag to install the subcharts associated with
# it (see Chart.yaml dependencies → tags).
# ============================================================================
tags:
  observability: true
  costManagement: false
  security: false

# ============================================================================
# Observability stack (logs / traces / metrics + supporting infra).
# ============================================================================
observability:
  # Telemetry signals (logs / traces / metrics) flow from the Randoli console
  # to the in-cluster stacks via the telemetry proxy (randoli-tproxy).
  telemetry:
    proxy:
      image: docker.io/randoli/telemetry-proxy:0.1.2
      # CORS_ALLOW_ORIGIN. Empty falls back to the default Randoli console
      # origins (https://telemetry-app.randoli.io,https://console.insights.randoli.io).
      # Set to "*" to allow any origin, or to a comma-separated list to allow
      # specific origins.
      cors: ""
      # KEYCLOAK_ISSUER_URL. Empty falls back to
      # https://sso.randoli.io/auth/realms/sso
      #keycloakIssuer:
      # Optional env vars. Leave empty to use the proxy image's built-in
      # defaults — they're only injected into the proxy ConfigMap when set.
      tunnelServerUrl: ""
      mode: ""

  otel:
    operator:
      enabled: true
    applyTargetAllocator: true

  logs:
    applyVectorPipeline: true
    watchNamespaces: []
    #lokiUrl:
    analyzers:
      enabled: true

  vector:
    enabled: true

  tracing:
    enabled: true

  # Tempo deployment mode. The two flags are mutually exclusive — exactly one
  # should be true. The default ships single-binary Tempo (charts/tempo); flip
  # both to switch to the distributed microservices Tempo (charts/tempo-distributed):
  #   --set observability.tempo.singleBinary.enabled=false \
  #   --set observability.tempo.distributed.enabled=true
  tempo:
    singleBinary:
      enabled: true
    distributed:
      enabled: false

  traceConfig:
    storage:
      type: TEMPO
      url:
      urlOtlp:
    opensearch:
      spanIndexPattern:
      rootSpanIndexPattern:
      skipTlsVerify: false
      secretName:
      usernameKeyRef:
      passwordKeyRef:

  netobserv:
    enabled: true
    applyCRs: true
    #explodeCRs: false

  security:
    #enabled: false
    #OFF|INTERVAL_SCANNING
    mode: "INTERVAL_SCANNING"
    cronSpec: "0 10,20 * * *"
    imagePullSecrets: ""

  sreAgent:
    enableReports: false

  agentInstrumentation:
    enabled: true
    otlpEndpoint:

  hostMetrics:
    # provider options:
    #   "node-exporter"     (default) keeps the prometheus-community node-exporter DaemonSet.
    #   "otel-host-metrics" disables it and deploys an OTel Collector DaemonSet instead.
    # IMPORTANT: when switching to "otel-host-metrics" you must also set:
    #   prometheus.prometheus-node-exporter.enabled: false
    provider: "node-exporter"

    # OTel host-metrics collector knobs — only consumed when
    # provider == "otel-host-metrics".
    otelCollector:
      # Image for the OTel host-metrics collector DaemonSet. Must include the
      # hostmetricsreceiver (opentelemetry-collector-contrib or equivalent).
      image: "otel/opentelemetry-collector-contrib:0.123.0"
      # How often to collect host metrics.
      collectionInterval: "60s"

# ============================================================================
# Cost management stack.
# ============================================================================
costManagement:
  vpaOperator:
    enabled: true
  # OpenCost config.
  # The documentation can be seen in the upstream Helm repository
  opencost:
    opencost:
      metrics:
        kubeStateMetrics:
          emitKsmV1Metrics: "false"
          emitKsmV1MetricsOnly: "true"
      exporter:
        extraVolumeMounts:
          - name: metrics-config-volume
            mountPath: /var/configs
    extraVolumes:
      - name: metrics-config-volume
        configMap:
          name: randoli-cost-metrics-config

# ============================================================================
# Agent Pod config — applied to the randoli-agent Deployment/StatefulSet,
# its PVC, ServiceAccount, etc.
# ============================================================================
image:
  registry: docker.io
  repository: randoli/insights-agent
  tag: "1.18"
  digest: ""
  ## Specify a imagePullPolicy
  ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
  ## ref: https://kubernetes.io/docs/user-guide/images/#pre-pulling-images
  ##
  pullPolicy: Always

labels:
  app: randoli-agent

deploymentAnnotations: {}

resources:
  limits:
    cpu: 1
    memory: 1.5Gi
  requests:
    cpu: 150m
    memory: 1.5Gi

# Agent DB Config
db:
  storage:
    pvSize: 10Gi
  resources:
    limits:
      cpu: 1
      memory: 3Gi
    requests:
      cpu: 150m
      memory: 2Gi
  flightEngine:
    memoryLimit: 1GB
    threads: 2
    tempDirectorySize: 5GB

anomalyDetection:
  # Defaults anomaly detection list contains detections for:
  # - memory usage spikes
  # - postgres transactions latency spikes
  # - postgres active connections spike
  # - JVM heap memory spike
  # - Golang heap memory usage spike
  defaultsQueries:
    enabled: true
  customQueries:
    # Path for user defined queries, queries should be in YAML format
    path: /prometheus

tektonPipeline:
  # Identifying tekton pipeline resource
  enabled: false

# -- Toleration labels for pod assignment
tolerations: []
# -- Node labels for pod assignment
nodeSelector: {}
# -- Affinity settings for pod assignment
affinity: {}
# -- Assign custom TopologySpreadConstraints rules
topologySpreadConstraints: []

extraEnv: []
extraEnvFrom: []

extraVolumes: []
  # - name: extra-queries
  #   configMap:
  #     name: extra-queries
extraVolumeMounts: []
  # - name: extra-queries
  #   mountPath: /prometheus

securityContext:
  fsGroup: 1001

# StorageClass for the randoli-agent's PVC (templates/pvc.yaml). Leave empty
# to use the cluster's default StorageClass.
storageClassName:

serviceAccount:
  create: true
  # If not set and create is true, a name is generated using the fullname template
  # name: ""
  automountServiceAccountToken: true
  annotations: {}
  labels: {}

# ============================================================================
# Subchart pass-through — values handed verbatim to each subchart's wrapper.
# Ordered alphabetically by the subchart key.
# ============================================================================
loki:
  loki:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      storage:
        type: "filesystem"
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: 2024-01-01
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      # Storage & retention config (see README "Storage and retention")
      # Retention is enforced by the compactor on the TSDB store.
      # limits_config.retention_period is the time-based cutoff; the compactor
      # actually deletes chunks older than that.
      limits_config:
        retention_period: 168h   # 7d
      compactor:
        working_directory: /var/loki/compactor
        retention_enabled: true
        delete_request_store: filesystem

    singleBinary:
      replicas: 1
      resources:
        limits:
          cpu: 2
          memory: 2Gi
        requests:
          cpu: 0.5
          memory: 1Gi
      extraEnv:
        # Keep a little bit lower than memory limits
        - name: GOMEMLIMIT
          value: 1750MiB
      persistence:
        # size         — PVC size for Loki chunks/index
        # storageClass — "" = cluster default; set to target a specific SC
        size: 100Gi
        storageClass: ""

      # Helm automatically propagates global.** values to the subchart. But in this case loki does not consume those values.
      # so we need these values to be set in this section
      tolerations: []
      nodeSelector: {}

    test:
      enabled: false

    # Disable canary
    lokiCanary:
      enabled: false

    # Disable gateway
    gateway:
      enabled: false

    # Disable caching
    chunksCache:
      enabled: false

    resultsCache:
      enabled: false

network:
  # TLS configuration — one of the two modes must be set when netobserv is enabled.
  # See charts/network/README.md for full instructions.
  tls:
    # Mode A (recommended): reference a pre-existing TLS Secret.
    # Create the secret before helm install:
    #   kubectl create secret tls <name> --cert=tls.crt --key=tls.key -n <namespace>
    existingSecret:
      name: ""          # set to the secret name to use Mode A
      certKey: tls.crt
      keyKey: tls.key

    # Mode B (fallback): auto-generate a self-signed cert via a pre-install Job.
    generateJob:
      enabled: true    # set to true to use Mode B

opentelemetry-operator:
  opentelemetry-operator:
    admissionWebhooks:
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kube-system
              - kube-node-lease
              - kube-public

prometheus:
  prometheus:
    # Set to false when using observability.hostMetrics.provider: otel-host-metrics
    prometheus-node-exporter:
      enabled: true
    server:
      # Storage & retention config (see README "Storage and retention")
      # retention      — time-based metric retention window
      # retentionSize  — disk-size safety cap (should be < persistentVolume.size)
      # persistentVolume.size          — PVC size for Prometheus TSDB
      # persistentVolume.storageClass  — "" = cluster default
      retention: "7d"
      retentionSize: "45GB"
      persistentVolume:
        size: 50Gi
        storageClass: ""
    serverFiles:
      prometheus.yml:
        otlp:
          promote_resource_attributes:
            - service.instance.id
            - service.name
            - service.namespace
            - cloud.availability_zone
            - cloud.region
            - container.name
            - deployment.environment.name
            - k8s.cluster.name
            - k8s.container.name
            - k8s.cronjob.name
            - k8s.daemonset.name
            - k8s.deployment.name
            - k8s.job.name
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            # custom attributes
            - host.id
            - host.name
            - host.type
            - cloud.platform
            - cloud.provider
            - match.label
            - postgresql.table.name
            - postgresql.schema.name
            - postgresql.index.name
            - postgresql.database.name
            - k8s.node.name

securityScans:
  kubescape-operator:
    # Must match the Helm install namespace (-n flag).
    # Override at install time if using a different namespace:
    #   --set "securityScans.kubescape-operator.ksNamespace=<your-namespace>"
    ksNamespace: "randoli-agents"
    capabilities:
      admissionController: disable
      prometheusExporter: enable
    storage:
      mtls:
        enabled: false

tempo:
  tempo:
    # Storage & retention config (see README "Storage and retention")
    # tempo.retention                 — block retention window (Tempo compactor)
    # persistence.size                — PVC size for trace data
    # persistence.storageClassName    — "" = cluster default; set to target a specific SC
    tempo:
      retention: "168h"   # 7d
    persistence:
      size: 50Gi
      storageClassName: ""

# Overrides for distributed Tempo (charts/tempo-distributed). Only takes effect
# when observability.tempo.distributed.enabled=true. For production, switch
# storage.trace.backend to object storage (s3 / gcs / azure) — see the README
# "Tempo deployment mode" section.
tempoDistributed:
  tempo-distributed:
    # Storage & retention config (see README "Storage and retention")
    # compactor.config.compaction.block_retention — block retention window
    # ingester.persistence.size                   — PVC size per ingester replica
    # ingester.persistence.storageClass           — "" = cluster default
    compactor:
      config:
        compaction:
          block_retention: "730h"   # a month
    ingester:
      persistence:
        size: 100Gi
        storageClass: ""

vectorOperator:
  vector-operator:
    # Operator Deployment scheduling.
    # global.* values are NOT automatically propagated here — set these explicitly
    # to match global.tolerations / global.nodeSelector / global.affinity / global.imagePullSecrets.
    tolerations: []
    nodeSelector: {}
    affinity: {}
    imagePullSecrets: []
    vector:
      agent:
        # Vector agent daemonset scheduling.
        # tolerations     → set same as global.daemonsets.tolerations
        # imagePullSecrets → set same as global.imagePullSecrets
        # configCheck.tolerations → set same as global.tolerations
        tolerations: []
        imagePullSecrets: []
        configCheck:
          tolerations: []

vpa:
  recommender:
    minCpuMillicores: 25
    minMemoryMb: 25
  vertical-pod-autoscaler:
    admissionController:
      mutatingWebhookConfiguration:
        namespaceSelector:
          matchExpressions:
            - key: kubernetes.io/metadata.name
              operator: NotIn
              values:
                - kube-system
                - kube-node-lease
                - kube-public
    recommender:
      extraArgs:
        - "--pod-recommendation-min-cpu-millicores=25"
        - "--pod-recommendation-min-memory-mb=25"
