global:
  imagePullSecrets: []
  networkCostMetrics:
    image:
      registry: docker.io
      repository: randoli/network-cost-metrics
      tag: "1.0.1"
      pullPolicy: Always
    metricGenerationInterval: 2m
    prometheusTimeout: 30s
    url:
  opencost:
    url:
  openshift:
    enabled: false
  prometheus:
    install: true
    url: ""
    secretName: ""
    usernameKey: ""
    passwordKey: ""
    bearerTokenKey: token
    tlsInsecureSkipVerify: true
    tlsCertConfigmapName: ""
    tlsCertConfigmapKey: ""
  alerts:
    slack:
      channel:
      api_url:
  secrets:
    cert: randoli-agent-cert
    config: randoli-agent-secret
  nodeSelector: {}
  affinity: {}
  tolerations: []
  daemonsets:
    nodeSelector: {}
    affinity: {}
    tolerations: []

observability:
  otel:
    operator:
      #enabled: false
    applyTargetAllocator: true
  logs:
    applyVectorPipeline: true
    watchNamespaces: []
    proxyCORS: "*"
    proxyImage: docker.io/randoli/telemetry-proxy:0.1.2
    #proxyKeycloakIssuer:
    #lokiUrl:
    analyzers:
      enabled: true
  vector:
    enabled: true
  security:
    #enabled: false
    #OFF|INTERVAL_SCANNING
    mode: "INTERVAL_SCANNING"
    cronSpec: "0 10,20 * * *"
    imagePullSecrets: ""
  tracing:
    #enabled: false
  netobserv:
    #enabled: false
    #applyCRs: false
    #explodeCRs: false
  traceConfig:
    storage:
      type: TEMPO
      url:
      urlOtlp:
    opensearch:
      spanIndexPattern:
      rootSpanIndexPattern:
      skipTlsVerify: false
      secretName:
      usernameKeyRef:
      passwordKeyRef:
  sreAgent:
    enableReports: false
  agentInstrumentation:
    enabled: true
    otlpEndpoint:

costManagement:
  vpaOperator:
    #enabled: false
  opencost:             # values for the upstream opencost dependency (wrapper key)
    opencost:           # upstream's "opencost:" config block
      metrics:
        kubeStateMetrics:
          emitKsmV1Metrics: "false"
          emitKsmV1MetricsOnly: "true"
      exporter:
        extraVolumeMounts:
          - name: metrics-config-volume
            mountPath: /var/configs
    extraVolumes:       # upstream's top-level extraVolumes
      - name: metrics-config-volume
        configMap:
          name: randoli-cost-metrics-config
logs:
  vector-operator:
    # Operator Deployment scheduling.
    # global.* values are NOT automatically propagated here — set these explicitly
    # to match global.tolerations / global.nodeSelector / global.affinity / global.imagePullSecrets.
    tolerations: []
    nodeSelector: {}
    affinity: {}
    imagePullSecrets: []
    vector:
      agent:
        # Vector agent daemonset scheduling.
        # tolerations     → set same as global.daemonsets.tolerations
        # imagePullSecrets → set same as global.imagePullSecrets
        # configCheck.tolerations → set same as global.tolerations
        tolerations: []
        imagePullSecrets: []
        configCheck:
          tolerations: []

tags:
  observability: false
  costManagement: false
  security: false

image:
  registry: docker.io
  repository: randoli/insights-agent
  tag: "1.18"
  digest: ""
  ## Specify a imagePullPolicy
  ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
  ## ref: https://kubernetes.io/docs/user-guide/images/#pre-pulling-images
  ##
  pullPolicy: Always

labels:
  app: randoli-agent

deploymentAnnotations: {}

resources:
  limits:
    cpu: 1
    memory: 1.5Gi
  requests:
    cpu: 150m
    memory: 1.5Gi

db:
  storage:
    pvSize: 10Gi
  resources:
    limits:
      cpu: 1
      memory: 3Gi
    requests:
      cpu: 150m
      memory: 2Gi
  flightEngine:
    memoryLimit: 1GB
    threads: 2
    tempDirectorySize: 5GB

anomalyDetection:
  # Defaults anomaly detection list contains detections for:
  # - memory usage spikes
  # - postgres transactions latency spikes
  # - postgres active connections spike
  # - JVM heap memory spike
  # - Golang heap memory usage spike
  defaultsQueries:
    enabled: true
  customQueries:
    # Path for user defined queries, queries should be in YAML format
    path: /prometheus

tektonPipeline:
  # Identifying tekton pipeline resource
  enabled: false

# -- Toleration labels for pod assignment
tolerations: []
# -- Node labels for pod assignment
nodeSelector: {}
# -- Affinity settings for pod assignment
affinity: {}
# -- Assign custom TopologySpreadConstraints rules
topologySpreadConstraints: []

extraEnv: []
extraEnvFrom: []

extraVolumes: []
  # - name: extra-queries
  #   configMap:
  #     name: extra-queries
extraVolumeMounts: []
  # - name: extra-queries
  #   mountPath: /prometheus

securityContext:
  fsGroup: 1001

storageClassName:

serviceAccount:
  create: true
  # If not set and create is true, a name is generated using the fullname template
  # name: ""
  automountServiceAccountToken: true
  annotations: {}
  labels: {}

securityScans:
  capabilities:
    admissionController: disable
  storage:
    mtls:
      enabled: false

network:
  # TLS configuration — one of the two modes must be set when netobserv is enabled.
  # See charts/network/README.md for full instructions.
  tls:
    # Mode A (recommended): reference a pre-existing TLS Secret.
    # Create the secret before helm install:
    #   kubectl create secret tls <name> --cert=tls.crt --key=tls.key -n <namespace>
    existingSecret:
      name: ""          # set to the secret name to use Mode A
      certKey: tls.crt
      keyKey: tls.key

    # Mode B (fallback): auto-generate a self-signed cert via a pre-install Job.
    generateJob:
      enabled: true    # set to true to use Mode B

prometheus:
  server:
    retention: "30d"
    retentionSize: "45GB"
    persistentVolume:
      size: 50Gi
  serverFiles:
    prometheus.yml:
      otlp:
        promote_resource_attributes:
          - service.instance.id
          - service.name
          - service.namespace
          - cloud.availability_zone
          - cloud.region
          - container.name
          - deployment.environment.name
          - k8s.cluster.name
          - k8s.container.name
          - k8s.cronjob.name
          - k8s.daemonset.name
          - k8s.deployment.name
          - k8s.job.name
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.replicaset.name
          - k8s.statefulset.name
          # custom attributes
          - host.id
          - host.name
          - host.type
          - cloud.platform
          - cloud.provider
          - match.label
          - postgresql.table.name
          - postgresql.schema.name
          - postgresql.index.name
          - postgresql.database.name

loki:
  loki:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      storage:
        type: "filesystem"
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: 2024-01-01
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

    singleBinary:
      replicas: 1
      resources:
        limits:
          cpu: 2
          memory: 2Gi
        requests:
          cpu: 0.5
          memory: 1Gi
      extraEnv:
        # Keep a little bit lower than memory limits
        - name: GOMEMLIMIT
          value: 1750MiB
      persistence:
        size: 100Gi

    tableManager:
      retention_deletes_enabled: true
      retention_period: 30d

    test:
      enabled: false

    # Disable canary
    lokiCanary:
      enabled: false

    # Disable gateway
    gateway:
      enabled: false

    # Disable caching
    chunksCache:
      enabled: false

    resultsCache:
      enabled: false

opentelemetry-operator:
  opentelemetry-operator:
    admissionWebhooks:
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kube-system
              - kube-node-lease
              - kube-public
tempo:
  tempo:
    retention: 730h
  persistence:
    size: 50Gi

vpa:
  admissionController:
    mutatingWebhookConfiguration:
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kube-system
              - kube-node-lease
              - kube-public
  recommender:
    minCpuMillicores: 25
    minMemoryMb: 25
    extraArgs:
      - "--pod-recommendation-min-cpu-millicores=25"
      - "--pod-recommendation-min-memory-mb=25"

