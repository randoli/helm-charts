apiVersion: v2
appVersion: "1.19"
description: Randoli Agent
home: https://randoli.ca
icon: https://s3.ca-central-1.amazonaws.com/randoli.ca/icons/icon-384x384.png
keywords:
  - randoli-agent
  - randoli
maintainers:
  - name: Randoli
    url: https://randoli.ca
    email: support@randoli.ca
name: randoli-agent
sources:
  - https://github.com/randoli/helm-charts
version: 2.0.0-rc.11
dependencies:
  - name: opentelemetry-operator
    version: 0.111.0
    condition: observability.otel.operator.enabled
    tags:
      - observability
      - costManagement
  - name: prometheus
    version: 26.0.1
    condition: global.prometheus.install
  - name: vertical-pod-autoscaler
    alias: vpa
    version: 0.8.1
    condition: costManagement.vpaOperator.enabled
    tags:
      - costManagement
  - name: security-scans
    alias: securityScans
    version: 1.29.6
    condition: observability.security.enabled
    tags:
      - security
  - name: logs
    version: 0.8.1
    condition: observability.vector.enabled
    tags:
      - observability
  - name: cost-management
    version: 1.42.0
    alias: costManagement
    tags:
      - costManagement
  - name: tempo
    version: 1.24.1
    condition: observability.tempo.singleBinary.enabled
    tags:
      - observability
  - name: tempo-distributed
    alias: tempoDistributed
    version: 1.61.3
    condition: observability.tempo.distributed.enabled
    tags:
      - observability
  - name: network
    version: 1.11.3
    condition: observability.netobserv.enabled
    tags:
      - observability
      - costManagement
  - name: loki
    version: 6.49.9
    condition: observability.loki.enabled
    tags:
      - observability
