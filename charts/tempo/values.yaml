# Values passed through to the upstream grafana/tempo chart.
# Full upstream value reference:
# https://github.com/grafana/helm-charts/blob/main/charts/tempo/values.yaml
tempo:
  fullnameOverride: "randoli-obs-tempo"

  persistence:
    enabled: true
    # Pinned (matches upstream default) so a future upstream flip can't cause
    # PVCs to be auto-deleted with the StatefulSet.
    enableStatefulSetAutoDeletePVC: false

  # Scheduling — global.* values are NOT automatically propagated here.
  # Set these explicitly to match global.tolerations / global.nodeSelector / global.affinity.
  tolerations: []
  nodeSelector: {}
  affinity: {}

  # imagePullSecrets — set explicitly to match global.imagePullSecrets.
  # global.imagePullSecrets is NOT automatically applied to the service account.
  serviceAccount:
    imagePullSecrets: []
