# Values passed through to the upstream vector-operator chart.
# Full upstream value reference:
# https://github.com/kaasops/vector-operator/blob/main/helm/values.yaml
vector-operator:
  fullnameOverride: "randoli-obs-vector-operator"  # stable ClusterRole name, safe for multi-release clusters

  replicaCount: 1

  image:
    repository: kaasops/vector-operator
    tag: ""  # uses chart appVersion (v0.4.1)
    pullPolicy: IfNotPresent

  createCRD: true

  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 50m
      memory: 50Mi

  # Operator Deployment scheduling.
  # To apply global scheduling constraints from the randoli-agent umbrella chart,
  # set logs.vector-operator.tolerations / nodeSelector / affinity / imagePullSecrets
  # to match global.tolerations / global.nodeSelector / global.affinity / global.imagePullSecrets.
  tolerations: []
  nodeSelector: {}
  affinity: {}
  imagePullSecrets: []

  vector:
    enable: true
    name: "randoli-obs-vector"
    useApiServerCache: false
    agent:
      image: timberio/vector:0.55.0-distroless-libc
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 50m
          memory: 192Mi
      # Vector agent daemonset scheduling.
      # To apply global scheduling constraints:
      #   tolerations     → set same as global.daemonsets.tolerations
      #   imagePullSecrets → set same as global.imagePullSecrets
      #   configCheck.tolerations → set same as global.tolerations
      tolerations: []
      imagePullSecrets: []
      configCheck:
        tolerations: []

      # On-disk buffer for Vector sinks (e.g. Loki). Each agent pod gets its
      # own generic ephemeral PVC mounted at dataDir; Vector writes its disk
      # buffer files there. To tune PV size or storage class for the buffer,
      # override the storage / storageClassName fields below. The buffer
      # itself is enabled per-sink via observability.logs.diskBuffer in the
      # umbrella chart values.
      dataDir: /vector-data-dir
      volumeMounts:
        - name: vector-buffer
          mountPath: /vector-data-dir
      volumes:
        - name: vector-buffer
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 5Gi
                # Empty string uses the cluster default StorageClass.
                storageClassName: ""

  rbac:
    create: true

  serviceAccount:
    create: true
    annotations: {}

  openshift:
    enabled: false
