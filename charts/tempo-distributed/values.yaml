# Values passed through to the upstream grafana/tempo-distributed chart.
# Full upstream value reference:
# https://github.com/grafana/helm-charts/blob/main/charts/tempo-distributed/values.yaml
tempo-distributed:
  fullnameOverride: "randoli-obs-tempo-dist"

  # Disable upstream anonymous usage reporting.
  reportingEnabled: false

  # Enable OTLP gRPC on the distributor so the OTel Collector can ship traces
  # to the randoli-obs-tempo-dist-distributor:4317 endpoint.
  traces:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: false

  # Local filesystem storage by default. For production use, switch to object
  # storage (s3 / gcs / azure). Example:
  #   --set tempoDistributed.tempo-distributed.storage.trace.backend=s3 \
  #   --set tempoDistributed.tempo-distributed.storage.trace.s3.bucket=<bucket> ...
  # See https://grafana.com/docs/tempo/latest/configuration/#storage
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # Default to a single-instance deployment of each microservice so the chart
  # is installable on a small cluster out of the box. Scale these up for HA.
  ingester:
    replicas: 1
    # Single-ingester default — must match replicas. Upstream defaults to 3 and
    # would otherwise fail ingestion until 3 ingesters are up.
    config:
      replication_factor: 1
    # Keep PVCs on StatefulSet deletion so trace blocks survive uninstall.
    persistence:
      enabled: true
      size: 100Gi
      storageClass: ""
    persistentVolumeClaimRetentionPolicy:
      enabled: true
      whenScaled: Retain
      whenDeleted: Retain

  distributor:
    replicas: 1
  querier:
    replicas: 1
  queryFrontend:
    replicas: 1

  # Storage & retention (see README "Storage and retention")
  # compactor.config.compaction.block_retention — block retention window
  compactor:
    replicas: 1
    config:
      compaction:
        block_retention: 730h   # 1 month

  # Gateway disabled — randoli-agent reads from the query-frontend Service
  # directly (randoli-obs-tempo-dist-query-frontend:3200).
  gateway:
    enabled: false

  # metrics-generator off by default — opt in if you need service graph metrics.
  metricsGenerator:
    enabled: false

  # Scheduling — global.* values are NOT automatically propagated here.
  # Set these explicitly to match global.tolerations / global.nodeSelector / global.affinity.
  tolerations: []
  nodeSelector: {}
  affinity: {}

  serviceAccount:
    imagePullSecrets: []
