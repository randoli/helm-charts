# Values passed through to the upstream kubescape-operator chart.
# Full upstream value reference:
# https://github.com/kubescape/helm-charts/blob/main/charts/kubescape-operator/values.yaml
kubescape-operator:
  # ksNamespace must match the Helm install namespace.
  # The randoli-agent umbrella chart sets this to "randoli-agents" in its values.yaml.
  # Override if installing to a different namespace.
  ksNamespace: ""

  clusterName: "cluster"

  kubescape:
    name: randoli-sec-kubescape
    continuousScan: enable
    submit: true
    serviceMonitor:
      enabled: false

  operator:
    name: randoli-sec-kubescape-operator

  kubevuln:
    name: randoli-sec-kubevuln

  storage:
    name: "randoli-sec-kubescape-storage"

  nodeAgent:
    name: randoli-sec-kubescape-node-agent

  synchronizer:
    name: randoli-sec-kubescape-synchronizer

  prometheusExporter:
    name: randoli-sec-kubescape-prometheus-exporter

  # Randoli App Insights: scan statefulsets and daemonsets in addition to deployments
  kubescapeScheduler:
    scanPolicy:
      resources: ["deployments","statefulsets","daemonsets"]

  # Exclude system namespaces from scanning
  excludeNamespaces: "kube-system,kube-public,kube-node-lease,kubeconfig,gmp-system,gmp-public"

  customScheduling:
    tolerations: []
    nodeSelector: {}
    affinity: {}

  imagePullSecrets: ""
