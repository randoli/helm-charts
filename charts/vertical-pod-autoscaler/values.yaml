# Values passed through to the upstream kubernetes/vertical-pod-autoscaler chart.
# Full upstream value reference:
# https://github.com/kubernetes/autoscaler/blob/master/charts/vertical-pod-autoscaler/values.yaml
vertical-pod-autoscaler:
  fullnameOverride: "randoli-cmk-vpa"

  # Reduced to 1 replica each (upstream defaults to 2)
  admissionController:
    replicas: 1

  recommender:
    replicas: 1

  updater:
    replicas: 1

  # Scheduling — global.* values are NOT automatically propagated here.
  # Set admissionController.tolerations / nodeSelector / affinity,
  # recommender.tolerations / nodeSelector / affinity,
  # updater.tolerations / nodeSelector / affinity explicitly.

  # imagePullSecrets — set explicitly to match global.imagePullSecrets.
  imagePullSecrets: []
